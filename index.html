<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaceFinder — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #F04E23;
    --dark: #0D0C0C;
    --surface: #181716;
    --border: rgba(255,255,255,0.07);
    --stone: #888380;
    --white: #FDFCFB;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--white);
    font-family: 'Geist', sans-serif;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--orange);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-sep {
    width: 1px; height: 14px;
    background: var(--border);
  }
  .logo-sub {
    font-family: 'Geist', sans-serif;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.02em;
    color: var(--stone);
  }

  /* ── VERSION TOGGLE ── */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ver-label {
    font-size: 11px;
    color: var(--stone);
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .ver-label.active { color: var(--white); }

  .pill-track {
    width: 52px;
    height: 28px;
    border-radius: 14px;
    background: var(--dark);
    border: 1.5px solid rgba(255,255,255,0.1);
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .pill-track:hover { border-color: rgba(255,255,255,0.2); }

  .pill-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 10px;
    background: var(--orange);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  .pill-track.v2 .pill-thumb {
    transform: translateX(24px);
  }

  /* ── META ROW ── */
  .meta-row {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--dark);
    flex-shrink: 0;
  }

  .meta-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--stone);
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.8); }
  }

  .ver-chips {
    display: flex;
    gap: 6px;
  }
  .ver-chip {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--stone);
    background: transparent;
    cursor: pointer;
    font-family: 'Geist', sans-serif;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }
  .ver-chip.active {
    background: rgba(240,78,35,0.12);
    border-color: var(--orange);
    color: var(--white);
  }

  /* ── FRAME AREA ── */
  .frame-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .frame-wrap {
    position: absolute;
    inset: 0;
    transition: transform 0.42s cubic-bezier(.32,.72,0,1), opacity 0.42s cubic-bezier(.32,.72,0,1);
    will-change: transform, opacity;
  }

  .frame-wrap.hidden-left {
    transform: translateX(-6%) scale(0.97);
    opacity: 0;
    pointer-events: none;
  }

  .frame-wrap.hidden-right {
    transform: translateX(6%) scale(0.97);
    opacity: 0;
    pointer-events: none;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── SHELL ── */
  .shell {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── V1 INDICATOR (desktop pill) ── */
  .v1-pill {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 11px;
    color: var(--stone);
    letter-spacing: 0.04em;
    z-index: 50;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .v1-pill span { color: var(--white); }
</style>
</head>
<body>

<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      ⚡ RACEFINDER
      <div class="logo-sep"></div>
      <span class="logo-sub">Onboarding Flow</span>
    </div>

    <div class="toggle-wrap">
      <span class="ver-label active" id="lv1">Desktop</span>
      <div class="pill-track" id="pillTrack" onclick="toggleVersion()">
        <div class="pill-thumb" id="pillThumb">
          <span id="pillIcon">🖥</span>
        </div>
      </div>
      <span class="ver-label" id="lv2">Mobile</span>
    </div>
  </div>

  <!-- META ROW -->
  <div class="meta-row">
    <div class="meta-badge">
      <div class="badge-dot"></div>
      <span id="metaText">v1 — Sidebar wizard · Desktop layout</span>
    </div>
    <div class="ver-chips">
      <button class="ver-chip active" id="chip1" onclick="setVersion(1)">v1 Desktop</button>
      <button class="ver-chip" id="chip2" onclick="setVersion(2)">v2 Mobile</button>
    </div>
  </div>

  <!-- FRAME AREA -->
  <div class="frame-area">
    <div class="frame-wrap" id="frame1wrap">
      <iframe src="v1.html" id="frame1" title="Onboarding v1 — Desktop sidebar"></iframe>
    </div>
    <div class="frame-wrap hidden-right" id="frame2wrap">
      <iframe src="v2.html" id="frame2" title="Onboarding v2 — Mobile card stack"></iframe>
    </div>

    <div class="v1-pill" id="v1pill">
      Press <span>← →</span> to navigate between versions
    </div>
  </div>

</div>

<script>
  let version = 1;

  function setVersion(v) {
    if (v === version) return;
    version = v;
    render();
  }

  function toggleVersion() {
    version = version === 1 ? 2 : 1;
    render();
  }

  function render() {
    const v1 = version === 1;

    // frames
    document.getElementById('frame1wrap').className = 'frame-wrap' + (v1 ? '' : ' hidden-left');
    document.getElementById('frame2wrap').className = 'frame-wrap' + (v1 ? ' hidden-right' : '');

    // pill
    const track = document.getElementById('pillTrack');
    track.className = 'pill-track' + (v1 ? '' : ' v2');
    document.getElementById('pillIcon').textContent = v1 ? '🖥' : '📱';

    // labels
    document.getElementById('lv1').className = 'ver-label' + (v1 ? ' active' : '');
    document.getElementById('lv2').className = 'ver-label' + (v1 ? '' : ' active');

    // chips
    document.getElementById('chip1').className = 'ver-chip' + (v1 ? ' active' : '');
    document.getElementById('chip2').className = 'ver-chip' + (v1 ? '' : ' active');

    // meta
    document.getElementById('metaText').textContent = v1
      ? 'v1 — Sidebar wizard · Desktop layout'
      : 'v2 — Card stack · Mobile-first · Swipeable';

    // hint pill
    document.getElementById('v1pill').style.opacity = v1 ? '0.8' : '0';
  }

  // keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') setVersion(2);
    if (e.key === 'ArrowLeft')  setVersion(1);
  });
</script>
</body>
</html>
